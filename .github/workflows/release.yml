name: Release images

# Build + push production images to GHCR on a version tag (v*) or manual dispatch.
# The VPS only ever PULLS these images — it never runs `docker build`.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

# Least privilege: read the repo, write packages (GHCR). Nothing else.
permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: docker/api/Dockerfile.prod
          - service: web
            dockerfile: docker/web/Dockerfile.prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GHCR image names must be lowercase.
      - name: Resolve owner (lowercase)
        id: owner
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tags: the git tag (on v* pushes), a commit SHA (always), branch name (on
      # dispatch), and :latest on tagged releases.
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.owner }}/spmis-${{ matrix.service }}
          tags: |
            type=ref,event=tag
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Build cache in the GitHub Actions cache backend, scoped per service.
          cache-from: type=gha,scope=spmis-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=spmis-${{ matrix.service }}
          provenance: false

  summary:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ always() }}
    steps:
      - name: Report
        run: |
          echo "## SP-MIS images" >> "$GITHUB_STEP_SUMMARY"
          echo "Owner: \`${GITHUB_REPOSITORY_OWNER,,}\` · Ref: \`${GITHUB_REF_NAME}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Pulled on the VPS via IMAGE_TAG in docker-compose.prod.yml (see docs/DEPLOY.md)." >> "$GITHUB_STEP_SUMMARY"
