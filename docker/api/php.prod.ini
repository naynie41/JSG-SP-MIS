; SP-MIS PHP overrides — PRODUCTION. Code is immutable in the image, so OPcache
; validates nothing (max throughput). Sized for document/import uploads.
memory_limit = 512M
upload_max_filesize = 50M
post_max_size = 51M
max_execution_time = 120
expose_php = Off

; OPcache — production: never re-stat files (image is immutable).
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 30000
opcache.validate_timestamps = 0
