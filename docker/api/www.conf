; SP-MIS production php-fpm pool. Overrides the base image's www.conf.
; The whole process already runs as non-root www-data (USER in the Dockerfile),
; so user/group are intentionally omitted (setting them while non-root only warns).
; clear_env=no passes the container environment (DB/Redis/RabbitMQ creds, APP_KEY,
; …) through to PHP.
[www]
listen = 9000

; Pass the container environment through to PHP (Laravel reads config from it).
clear_env = no

; Surface PHP worker output to the container logs (12-factor logging).
catch_workers_output = yes
decorate_workers_output = no

; Liveness endpoint for the container healthcheck (cgi-fcgi GET /ping → "pong").
ping.path = /ping
ping.response = pong

; Process manager — tune per VPS size / resource limits.
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 500
