; SP-MIS PHP overrides (dev-oriented but safe defaults).
memory_limit = 512M
upload_max_filesize = 25M
post_max_size = 26M
max_execution_time = 120
expose_php = Off

; OPcache — enabled; validate timestamps so code changes are picked up in dev.
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
