# SPA static server (internal, behind the edge reverse proxy). Non-root nginx on
# 8080. Security headers + TLS/HSTS are applied by the edge proxy, not here.
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;
    server_tokens off;

    gzip on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Container healthcheck.
    location = /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Fingerprinted build assets are immutable — cache hard.
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA history-mode fallback: unknown paths render index.html.
    location / {
        try_files $uri /index.html;
    }
}
