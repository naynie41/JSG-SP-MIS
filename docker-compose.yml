# =============================================================================
# SP-MIS local development stack.
#   docker compose up -d   → api (php-fpm) + nginx + web + postgres(postgis)
#                            + redis + rabbitmq + queue worker
#
# Dev passwords below default to the placeholders in api/.env.example. Override
# them via a root .env file (or real secrets) for any non-local environment.
# =============================================================================

services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-spmis}
      POSTGRES_USER: ${POSTGRES_USER:-spmis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-spmis} -d ${POSTGRES_DB:-spmis}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-spmis}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-change-me-rabbitmq}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"      # AMQP
      - "${RABBITMQ_MGMT_PORT:-15672}:15672" # Management UI
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    environment:
      RUN_MIGRATIONS: "true" # api role owns schema migration on boot
    volumes:
      - ./api:/var/www/html
      - api_vendor:/var/www/html/vendor
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/9000'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 180s

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${API_HTTP_PORT:-8080}:80"
    volumes:
      - ./api:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  worker:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    command: ["php", "artisan", "queue:work", "rabbitmq", "--tries=3", "--max-time=3600"]
    environment:
      RUN_MIGRATIONS: "false"
    volumes:
      - ./api:/var/www/html
      - api_vendor:/var/www/html/vendor
    depends_on:
      api:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'queue:work' || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    ports:
      - "${WEB_PORT:-5173}:5173"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:5173 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 180s

volumes:
  pgdata:
  redisdata:
  rabbitmqdata:
  api_vendor:
  web_node_modules:
