# =============================================================================
# SP-MIS PRODUCTION stack — PULL-ONLY. The VPS never runs `docker build`; app
# images are pulled from GHCR (built by .github/workflows/release.yml).
#
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# Config comes from a root-owned, gitignored .env on the VPS (see
# .env.prod.example). Only nginx publishes ports (80/443); every other service is
# reachable only on the internal network. See docs/DEPLOY.md.
# =============================================================================

x-restart: &restart unless-stopped

services:
  # ---- Data services (official images, named volumes, internal-only) --------
  postgres:
    image: postgis/postgis:16-3.4
    restart: *restart
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-spmis}
      POSTGRES_USER: ${POSTGRES_USER:-spmis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-spmis} -d ${POSTGRES_DB:-spmis}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 1024M }

  redis:
    image: redis:7-alpine
    restart: *restart
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD} # exposed to the container so the healthcheck can auth
    volumes:
      - redisdata:/data
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 256M }

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: *restart
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-spmis}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    networks: [internal]
    # No ports published — the management UI (15672) is reachable only via an SSH
    # tunnel to the VPS, never public.
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    deploy:
      resources:
        limits: { cpus: "0.75", memory: 512M }

  # ---- Application (pulled from GHCR) ---------------------------------------
  api:
    image: ghcr.io/${GHCR_OWNER}/spmis-api:${IMAGE_TAG:?set IMAGE_TAG to the release tag}
    restart: *restart
    env_file: [.env]
    environment:
      RUN_MIGRATIONS: "true" # the api role owns schema migration on boot
    volumes:
      - documents:/var/www/html/storage/app/private
    networks: [internal]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "SCRIPT_NAME=/ping SCRIPT_FILENAME=/ping REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000 | grep -q pong"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 768M }

  worker:
    image: ghcr.io/${GHCR_OWNER}/spmis-api:${IMAGE_TAG:?set IMAGE_TAG to the release tag}
    restart: *restart
    command: ["php", "artisan", "queue:work", "rabbitmq", "--tries=3", "--max-time=3600", "--sleep=3"]
    env_file: [.env]
    environment:
      RUN_MIGRATIONS: "false" # never migrate from the worker (avoids races)
    volumes:
      - documents:/var/www/html/storage/app/private
    networks: [internal]
    depends_on:
      api: { condition: service_healthy } # start after migrations have run
      rabbitmq: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'queue:work' >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits: { cpus: "1.0", memory: 768M }

  scheduler:
    image: ghcr.io/${GHCR_OWNER}/spmis-api:${IMAGE_TAG:?set IMAGE_TAG to the release tag}
    restart: *restart
    # Runs the Laravel scheduler in-container: encrypted offsite BACKUPS (daily),
    # the restore drill, data-retention, SLA sweeps, dashboard snapshots, sync.
    command: ["php", "artisan", "schedule:work"]
    env_file: [.env]
    environment:
      RUN_MIGRATIONS: "false"
    volumes:
      - documents:/var/www/html/storage/app/private
    networks: [internal]
    depends_on:
      api: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'schedule:work' >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 512M }

  web:
    image: ghcr.io/${GHCR_OWNER}/spmis-web:${IMAGE_TAG:?set IMAGE_TAG to the release tag}
    restart: *restart
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits: { cpus: "0.25", memory: 128M }

  # ---- Edge: TLS termination + reverse proxy (the ONLY public service) -------
  nginx:
    image: nginx:1.27-alpine
    restart: *restart
    ports:
      - "80:80"
      - "443:443"
    environment:
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:?set your domain}
      NGINX_SSL_CERTIFICATE: ${NGINX_SSL_CERTIFICATE:-/etc/letsencrypt/live/${NGINX_SERVER_NAME}/fullchain.pem}
      NGINX_SSL_CERTIFICATE_KEY: ${NGINX_SSL_CERTIFICATE_KEY:-/etc/letsencrypt/live/${NGINX_SERVER_NAME}/privkey.pem}
      NGINX_CLIENT_MAX_BODY_SIZE: ${NGINX_CLIENT_MAX_BODY_SIZE:-50M}
      API_UPSTREAM: api:9000
      WEB_UPSTREAM: web:8080
    volumes:
      - ./docker/nginx/prod.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ${TLS_DIR:-/etc/letsencrypt}:/etc/letsencrypt:ro
      - ${ACME_WEBROOT:-./acme}:/var/www/acme:ro
    networks: [internal]
    depends_on:
      api: { condition: service_healthy }
      web: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    deploy:
      resources:
        limits: { cpus: "0.5", memory: 128M }

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  rabbitmqdata:
  documents: # uploaded beneficiary documents (persisted, backed up)
